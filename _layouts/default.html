---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    <meta property="og:image" content="https://ombhatt2.github.io/images/portfolio-preview.jpg" />
    <meta property="og:site_name" content="Om Bhatt - Portfolio" />
    
    <link rel="icon" type="image/png" href="https://ombhatt2.github.io/images/favicon-192x192.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Om Bhatt",
      "alternateName": "Om Bhatt - Portfolio",
      "url": "https://ombhatt2.github.io/"
    }
    </script>

    {% include head/custom.html %}
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    
    <style>
      /* --- Custom Cursor CSS --- */
      body.custom-cursor-active, 
      body.custom-cursor-active * {
        cursor: none !important;
      }

      #cursor-dot, #cursor-outline {
        position: fixed;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%); /* This perfectly centers the dot and outline */
        border-radius: 50%;
        z-index: 999999999; 
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease-in-out;
        font-size: 0; 
        color: transparent;
      }

      #cursor-dot {
        width: 6px;
        height: 6px;
        background-color: #800000;
        box-shadow: 0 0 8px 2px rgba(128, 0, 0, 0.5); /* Subtle glow for light mode */
      }

      #cursor-outline {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(128, 0, 0, 0.4);
        box-shadow: 0 0 15px rgba(128, 0, 0, 0.15); /* Soft ambient ring glow */
        transition: width 0.2s, height 0.2s, background-color 0.2s;
      }

      /* 🔥 INTENSE LASER EFFECT FOR DARK MODE 🔥 */
      html[data-theme="dark"] #cursor-dot,
      body.dark-theme #cursor-dot {
        background-color: #ff4d4d !important;
        /* Creates a bright core with a massive, radiating neon glow */
        box-shadow: 0 0 10px 3px rgba(255, 77, 77, 0.8), 0 0 25px 8px rgba(255, 77, 77, 0.4) !important;
      }

      html[data-theme="dark"] #cursor-outline,
      body.dark-theme #cursor-outline {
        border-color: rgba(255, 77, 77, 0.8) !important;
        box-shadow: 0 0 18px rgba(255, 77, 77, 0.4) !important;
      }

      @media (max-width: 768px) {
        #cursor-dot, #cursor-outline { display: none !important; }
        body.custom-cursor-active, body.custom-cursor-active * { cursor: auto !important; }
      }

      /* --- High-Tech Robotics Boot Loader CSS --- */
      #boot-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0a0a0a; 
        /* Subtle CAD/Blueprint Grid */
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center center;
        z-index: 99999999; 
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #ffffff; 
        overflow: hidden;
        transition: opacity 0.8s cubic-bezier(0.8, 0, 0.2, 1);
      }

      #boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Central HUD Interface */
      .loader-core {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 240px;
        height: 240px;
      }

      /* Targeting Brackets */
      .hud-bracket {
        position: absolute;
        width: 30px;
        height: 30px;
        border: 0 solid rgba(128, 0, 0, 0.8);
        opacity: 0.7;
        transition: all 0.3s ease;
      }
      .hud-bracket.tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
      .hud-bracket.tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
      .hud-bracket.bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
      .hud-bracket.br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }

      .spin-ring {
        position: absolute;
        border-radius: 50%;
        box-sizing: border-box;
      }

      /* Segmented LiDAR Sweeps */
      .spin-ring.outer {
        width: 190px;
        height: 190px;
        border: 1px solid rgba(128, 0, 0, 0.1);
        border-top: 2px solid #800000;
        border-left: 2px dashed #800000;
        animation: spin 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }

      .spin-ring.inner {
        width: 160px;
        height: 160px;
        border: 1px dashed rgba(255, 255, 255, 0.15);
        border-bottom: 2px solid #ffffff;
        animation: spin-reverse 3s linear infinite;
      }

      .load-percent {
        font-size: 2.8rem;
        font-weight: 200;
        letter-spacing: 3px;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 10px rgba(255,255,255,0.2);
      }

      .load-label {
        position: absolute;
        bottom: -50px;
        font-size: 0.7rem;
        letter-spacing: 5px;
        font-weight: 600;
        color: #666666;
        text-transform: uppercase;
        animation: pulse 1.5s infinite alternate;
        white-space: nowrap;
      }

      /* Terminals & Data Streams */
      .telemetry-text {
        position: absolute;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        color: #555555;
        line-height: 1.6;
      }

      #terminal-text {
        bottom: 30px;
        left: 30px;
        text-align: left;
      }

      #sensor-data {
        top: 30px;
        right: 30px;
        text-align: right;
        color: #777777;
      }

      .log-line { margin-bottom: 2px; }

      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
      @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }

      /* ========================================================
         MOBILE PROFILE PICTURE & FOLLOW BUTTON OVERRIDE
         ======================================================== */
      @media (max-width: 768px) {
        .author__profile {
          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
          text-align: center !important;
        }

        .author__avatar {
          display: block !important;
          margin: 0 auto 15px auto !important;
          width: 100% !important;
          text-align: center !important;
        }

        .author__avatar img {
          width: 140px !important; 
          height: 140px !important;
          object-fit: cover !important;
          margin: 0 auto !important;
          border-width: 3px !important;
        }

        /* 1. Force the Name and Bio to center and take full width */
        .author__content {
          display: block !important;
          width: 100% !important;
          text-align: center !important;
          margin-bottom: 15px !important;
        }

        /* 2. Hide the default Follow button */
        .author__urls-wrapper button {
          display: none !important;
        }

        /* 3. Force the links wrapper to sit underneath the bio */
        .author__urls-wrapper {
          display: block !important;
          width: 100% !important;
        }

        /* 4. Center the links neatly in a row */
        .author__urls-wrapper .author__urls {
          display: flex !important;
          position: static !important;
          visibility: visible !important;
          opacity: 1 !important;
          box-shadow: none !important;
          background: transparent !important;
          border: none !important;
          padding: 0 !important;
          margin-top: 5px !important;
          flex-wrap: wrap !important;
          justify-content: center !important;
          gap: 10px !important;
        }
        
        /* 5. Hide the little dropdown triangle arrows */
        .author__urls-wrapper .author__urls:before,
        .author__urls-wrapper .author__urls:after {
          display: none !important;
        }

        .author__urls-wrapper .author__urls li {
          margin: 0 !important;
        }
      }
      /* --- Modernized Sidebar Profile (SIDEBAR-SCALED FIX) --- */
  
  /* 1. Bold Glass Container (Position Override Fix) */
  .author__profile {
    background: rgba(255, 255, 255, 0.95) !important; 
    backdrop-filter: blur(12px) !important;
    -webkit-backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(0, 0, 0, 0.12) !important; 
    border-radius: 12px !important;
    padding: 25px 15px !important;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08) !important; 
    
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important; 
    text-align: center !important;
    
    /* THE ULTIMATE FIX: Break out of the theme's invisible wall */
    margin-top: 10px !important;
    width: 250px !important;        
    position: relative !important;
    left: -60px !important; /* Physically slides the card 60px into the white space */
    
    box-sizing: border-box !important;
  }

  /* Reset the shift on tablets/phones so it centers correctly */
  @media (max-width: 1024px) {
    .author__profile {
      left: 0 !important;
      width: 100% !important;
    }
  }

  /* 2. Bolder, Larger Avatar */
  .author__avatar {
    display: block !important;
    width: 100% !important;
  }

  .author__avatar img {
    width: 160px !important;  /* Significantly increased size */
    height: 160px !important; /* Significantly increased size */
    border-radius: 50% !important;
    border: 4px solid #800000 !important; /* Thicker maroon border */
    box-shadow: 0 0 25px rgba(128, 0, 0, 0.25) !important; /* Stronger glow effect */
    display: block !important;
    margin: 0 auto 20px auto !important; /* Increased bottom spacing */
    object-fit: cover !important;
  }

  /* 3. Tighter Text Proportions */
  .author__content {
    width: 100% !important;
  }

  .author__name {
    font-size: 1.4rem !important; /* Scaled down */
    font-weight: 800 !important;
    letter-spacing: -0.5px !important;
    margin-bottom: 5px !important;
    color: #111111 !important;
    display: block !important;
  }

  .author__bio {
    font-size: 0.85rem !important; /* Scaled down */
    line-height: 1.4 !important;
    color: #555555 !important;
    margin-bottom: 20px !important;
    font-style: italic;
  }

  /* 4. Cleaner Social Buttons */
  .author__urls-wrapper {
    width: 100% !important;
  }

  .author__urls {
    display: flex !important;
    flex-direction: column !important;
    align-items: stretch !important; 
    gap: 8px !important; /* Tighter gap between buttons */
    margin-top: 10px !important;
    padding: 0 !important;
    width: 100% !important;
  }

  .author__urls li {
    margin: 0 !important;
    list-style-type: none !important;
  }

  .author__urls a {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 8px !important;
    background: rgba(0, 0, 0, 0.03) !important;
    padding: 8px 12px !important; /* Sleeker buttons */
    border-radius: 6px !important;
    border: 1px solid rgba(0, 0, 0, 0.06) !important;
    transition: all 0.2s ease !important;
    font-size: 0.85rem !important;
    font-weight: 600 !important;
    color: #444444 !important;
    text-decoration: none !important;
    box-sizing: border-box !important;
  }

  .author__urls a:hover {
    background: rgba(128, 0, 0, 0.08) !important;
    border-color: #800000 !important;
    color: #800000 !important;
    transform: translateY(-1px) !important;
  }
  
  .author__urls-wrapper button, 
  .author__urls:before, 
  .author__urls:after {
    display: none !important;
  }
  
  /* --- MASTER SIDEBAR WRAPPER OVERRIDE --- */
  .sidebar {
    position: relative !important;
    transform: translateX(-50px) !important; /* Forces the entire column to the left */
  }

  /* Keep it centered on mobile phones */
  @media (max-width: 1024px) {
    .sidebar {
      transform: translateX(0) !important;
    }
  }
    </style>
  </head>

  <body>
    <div id="cursor-dot">&nbsp;</div>
    <div id="cursor-outline">&nbsp;</div>

    <div id="boot-loader">
      <div class="loader-core">
        <div class="hud-bracket tl"></div>
        <div class="hud-bracket tr"></div>
        <div class="hud-bracket bl"></div>
        <div class="hud-bracket br"></div>
        <div class="spin-ring outer">&nbsp;</div>
        <div class="spin-ring inner">&nbsp;</div>
        <div class="load-percent" id="load-percent">0%</div>
        <div class="load-label">SENSORS ONLINE</div>
      </div>
      <div id="terminal-text" class="telemetry-text">&nbsp;</div>
      <div id="sensor-data" class="telemetry-text">&nbsp;</div>
    </div>

    <div id="particles-js"></div>

    <div class="progress-container">
      <div class="progress-bar" id="myBar">&nbsp;</div>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      window.onscroll = function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        var myBar = document.getElementById("myBar");
        if(myBar) myBar.style.width = scrolled + "%";
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        VanillaTilt.init(document.querySelectorAll(".archive__item"), {
          max: 10, speed: 400, glare: true, "max-glare": 0.3
        });
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
      if(document.getElementById("particles-js")) {
        particlesJS("particles-js", {
          "particles": {
            "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#a8a8a8" }, 
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#a8a8a8", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
          },
          "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
            "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
          },
          "retina_detect": true
        });
      }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var targets = document.querySelectorAll('p, h1, h2, h3, ul, .archive__item, .skill-cloud, .reveal-target, .hover-card');
        targets.forEach(function(el) { el.setAttribute('data-aos', 'fade-up'); });
        
        /* Set once: true so it only animates the very first time */
        AOS.init({ duration: 800, easing: 'ease-out', once: true, offset: 40 });
      });
    </script>

    <script>
      let dot = document.getElementById("cursor-dot");
      let outline = document.getElementById("cursor-outline");

      if (!dot) { dot = document.createElement("div"); dot.id = "cursor-dot"; document.body.appendChild(dot); }
      if (!outline) { outline = document.createElement("div"); outline.id = "cursor-outline"; document.body.appendChild(outline); }

      let isCursorActive = false;
      let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
      let outlineX = mouseX, outlineY = mouseY;

      window.addEventListener("mousemove", function (e) {
        if (!isCursorActive) {
          document.body.classList.add("custom-cursor-active");
          dot.style.opacity = "1";
          outline.style.opacity = "1";
          isCursorActive = true;
        }
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
      });

      function animateOutline() {
        outlineX += (mouseX - outlineX) * 0.2;
        outlineY += (mouseY - outlineY) * 0.2; 
        if(outline) {
          outline.style.left = `${outlineX}px`;
          outline.style.top = `${outlineY}px`;
        }
        requestAnimationFrame(animateOutline);
      }
      animateOutline();

      const interactables = document.querySelectorAll("a, button, .hover-card, .skill-badge, input, textarea");
      interactables.forEach(el => {
        el.addEventListener("mouseenter", () => {
          if(outline) {
            outline.style.width = "45px";
            outline.style.height = "45px";
            outline.style.backgroundColor = "rgba(128, 0, 0, 0.05)";
            outline.style.border = "1px solid #800000";
          }
        });
        el.addEventListener("mouseleave", () => {
          if(outline) {
            outline.style.width = "32px";
            outline.style.height = "32px";
            outline.style.backgroundColor = "transparent";
            outline.style.border = "1px solid rgba(128, 0, 0, 0.4)";
          }
        });
      });
    </script>

    <script>
      (function() {
        let bootLoader = document.getElementById('boot-loader');
        let terminalText = document.getElementById('terminal-text');
        let sensorDataText = document.getElementById('sensor-data');
        let percentText = document.getElementById('load-percent');

        if (!bootLoader || !terminalText || !percentText) return;

        let hasBooted = false;
        try { hasBooted = sessionStorage.getItem('systemBooted'); } catch (e) {}

        if (!hasBooted) {
          const bootSequence = [
            "SYS_INIT: Workspace Environment",
            "LOAD: Core Dependencies [OK]",
            "MOUNT: Kinematic Schemas",
            "FETCH: Autonomous Navigation Data",
            "INIT: Embedded Hardware Controllers",
            "RESOLVE: ROS2 Node Pathways",
            "CALIBRATE: Visual Assets [OK]",
            "UPLINK: Establishing Secure Connection...",
            "RENDER: Layout Finalized"
          ];

          /* 1. Rapid Telemetry Stream */
          let delay = 0;
          bootSequence.forEach((line) => {
            delay += Math.random() * 120 + 40; 
            setTimeout(() => {
              const p = document.createElement('div');
              p.className = 'log-line';
              p.textContent = line;
              terminalText.appendChild(p);
              if (terminalText.childNodes.length > 5) {
                terminalText.removeChild(terminalText.firstChild);
              }
            }, delay);
          });

          /* 2. Simulated IMU Sensor Data */
          const dataInterval = setInterval(() => {
            if (sensorDataText) {
              let yaw = (Math.random() * 360).toFixed(2);
              let pitch = (Math.random() * 90 - 45).toFixed(2);
              let roll = (Math.random() * 180 - 90).toFixed(2);
              sensorDataText.innerHTML = `IMU_YAW: ${yaw}&deg;<br>IMU_PIT: ${pitch}&deg;<br>IMU_ROL: ${roll}&deg;<br>LIDAR: ACTIVE<br>CAM_0: 60FPS`;
            }
          }, 120);

          /* 3. Guaranteed Counter Loop */
          let currentPercent = 0;
          const counterInterval = setInterval(() => {
            currentPercent += 1.15; 
            
            if (currentPercent >= 100) {
              currentPercent = 100;
              clearInterval(counterInterval);
              clearInterval(dataInterval);
              percentText.textContent = '100%';
              if(sensorDataText) sensorDataText.innerHTML = "STATUS: OPTIMAL<br>SYSTEM: READY";
              
              setTimeout(() => {
                bootLoader.style.opacity = '0'; 
                setTimeout(() => bootLoader.style.display = 'none', 800); 
                try { sessionStorage.setItem('systemBooted', 'true'); } catch (e) {}
              }, 400);
            } else {
              percentText.textContent = Math.floor(currentPercent) + '%';
            }
          }, 15); 

        } else {
          bootLoader.style.display = 'none';
        }
      })();
    </script>
    
  </body>
</html>
