---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>
    <div id="particles-js"></div>

    <div class="progress-container">
      <div class="progress-bar" id="myBar"></div>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      window.onscroll = function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        document.getElementById("myBar").style.width = scrolled + "%";
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        VanillaTilt.init(document.querySelectorAll(".archive__item"), {
          max: 10,
          speed: 400,
          glare: true,
          "max-glare": 0.3
        });
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": "#a8a8a8" }, 
          "shape": { "type": "circle" },
          "opacity": { "value": 0.5, "random": false },
          "size": { "value": 3, "random": true },
          "line_linked": {
            "enable": true,
            "distance": 150,
            "color": "#a8a8a8",
            "opacity": 0.5,
            "width": 1
          },
          "move": {
            "enable": true,
            "speed": 2.5,
            "direction": "none",
            "random": true,
            "straight": false,
            "out_mode": "out",
            "bounce": false,
          }
        },
        "interactivity": {
          "detect_on": "window", /* Tracks your mouse anywhere on the screen */
          "events": {
            "onhover": { "enable": true, "mode": ["grab", "repulse"] }, /* Adds magnetic scattering */
            "onclick": { "enable": true, "mode": "push" },
            "resize": true
          },
          "modes": {
            "grab": { "distance": 180, "line_linked": { "opacity": 0.8 } },
            "repulse": { "distance": 100, "duration": 0.4 }, /* Controls the forcefield size */
            "push": { "particles_nb": 5 }
          }
        },
        "retina_detect": true
      });
    </script>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 800, /* Animation lasts 0.8 seconds */
        once: true, /* Animations only happen once when scrolling down */
        offset: 100 /* Starts animation when element is 100px from the bottom of the screen */
      });
    </script>
    
  </body>
</html>
