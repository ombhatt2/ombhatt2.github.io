---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>
    <div id="particles-js"></div>

    <div class="progress-container">
      <div class="progress-bar" id="myBar"></div>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      window.onscroll = function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        document.getElementById("myBar").style.width = scrolled + "%";
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        VanillaTilt.init(document.querySelectorAll(".archive__item"), {
          max: 10,
          speed: 400,
          glare: true,
          "max-glare": 0.3
        });
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": "#a8a8a8" }, 
          "shape": { "type": "circle" },
          "opacity": { "value": 0.5, "random": false },
          "size": { "value": 3, "random": true },
          "line_linked": {
            "enable": true,
            "distance": 150,
            "color": "#a8a8a8",
            "opacity": 0.4,
            "width": 1
          },
          "move": {
            "enable": true,
            "speed": 2,
            "direction": "none",
            "random": false,
            "straight": false,
            "out_mode": "out",
            "bounce": false,
          }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": {
            "onhover": { "enable": true, "mode": "grab" },
            "onclick": { "enable": true, "mode": "push" },
            "resize": true
          },
          "modes": {
            "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
            "push": { "particles_nb": 4 }
          }
        },
        "retina_detect": true
      });
    </script>

    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <style>
      /* Hide default cursor on desktop */
      @media (min-width: 769px) {
        body, a, button, .hover-card, .skill-badge {
          cursor: none !important;
        }
      }

      /* Base styles for the cursor components */
      .cursor-dot,
      .cursor-outline {
        position: fixed;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        z-index: 9999;
        pointer-events: none; /* Lets you click through it */
      }

      /* The solid inner dot */
      .cursor-dot {
        width: 6px;
        height: 6px;
        background-color: #ff4d4d;
      }

      /* The trailing outer ring */
      .cursor-outline {
        width: 30px;
        height: 30px;
        border: 2px solid rgba(128, 0, 0, 0.6);
        transition: width 0.2s ease-out, height 0.2s ease-out, background-color 0.2s ease-out;
      }

      /* Disable custom cursor entirely on mobile touch screens */
      @media (max-width: 768px) {
        .cursor-dot, .cursor-outline {
          display: none !important;
        }
      }
    </style>

    <script>
      const cursorDot = document.querySelector("[data-cursor-dot]");
      const cursorOutline = document.querySelector("[data-cursor-outline]");

      window.addEventListener("mousemove", function (e) {
        const posX = e.clientX;
        const posY = e.clientY;

        // The dot follows instantly
        cursorDot.style.left = `${posX}px`;
        cursorDot.style.top = `${posY}px`;

        // The outline trails with a smooth animation delay
        cursorOutline.animate({
          left: `${posX}px`,
          top: `${posY}px`
        }, { duration: 400, fill: "forwards" });
      });

      // Add the expanding hover effect to all clickable elements
      const interactables = document.querySelectorAll("a, button, .hover-card, .skill-badge, input, textarea");
      
      interactables.forEach(el => {
        el.addEventListener("mouseenter", () => {
          cursorOutline.style.width = "50px";
          cursorOutline.style.height = "50px";
          cursorOutline.style.backgroundColor = "rgba(128, 0, 0, 0.1)";
          cursorOutline.style.border = "2px solid #ff4d4d";
        });
        
        el.addEventListener("mouseleave", () => {
          cursorOutline.style.width = "30px";
          cursorOutline.style.height = "30px";
          cursorOutline.style.backgroundColor = "transparent";
          cursorOutline.style.border = "2px solid rgba(128, 0, 0, 0.6)";
        });
      });
    </script>
    
  </body>
</html>
