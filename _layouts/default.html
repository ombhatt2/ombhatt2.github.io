---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    
    <style>
      /* --- Custom Cursor CSS --- */
      body.custom-cursor-active, 
      body.custom-cursor-active * {
        cursor: none !important;
      }

      #cursor-dot, #cursor-outline {
        position: fixed;
        top: 0;
        left: 0;
        border-radius: 50%;
        z-index: 999999999; /* Highest possible layer so it shows over the boot screen */
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease-in-out;
      }

      #cursor-dot {
        width: 8px;
        height: 8px;
        background-color: #ff4d4d;
      }

      #cursor-outline {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(128, 0, 0, 0.6);
        transition: width 0.2s, height 0.2s, background-color 0.2s;
      }

      @media (max-width: 768px) {
        #cursor-dot, #cursor-outline { display: none !important; }
        body.custom-cursor-active, body.custom-cursor-active * { cursor: auto !important; }
      }

      /* --- Boot Loader CSS --- */
      #boot-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0d0d0d;
        z-index: 99999999; 
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: 3rem 2rem;
        font-family: 'Courier New', Courier, monospace;
        color: #ff4d4d; 
        font-size: 15px;
        overflow: hidden;
        transition: opacity 0.6s ease-in-out;
      }

      #boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .log-line {
        margin-bottom: 6px;
        text-shadow: 0 0 8px rgba(255, 77, 77, 0.4); 
      }

      .cursor-blink {
        display: inline-block;
        width: 10px;
        height: 16px;
        background-color: #ff4d4d;
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
        margin-left: 6px;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>

  <body>
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div id="boot-loader">
      <div id="terminal-text"></div>
    </div>

    <div id="particles-js"></div>

    <div class="progress-container">
      <div class="progress-bar" id="myBar"></div>
    </div>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
      window.onscroll = function() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = (winScroll / height) * 100;
        document.getElementById("myBar").style.width = scrolled + "%";
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        VanillaTilt.init(document.querySelectorAll(".archive__item"), {
          max: 10, speed: 400, glare: true, "max-glare": 0.3
        });
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": "#a8a8a8" }, 
          "shape": { "type": "circle" },
          "opacity": { "value": 0.5, "random": false },
          "size": { "value": 3, "random": true },
          "line_linked": { "enable": true, "distance": 150, "color": "#a8a8a8", "opacity": 0.4, "width": 1 },
          "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
          "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
        },
        "retina_detect": true
      });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var targets = document.querySelectorAll('p, h1, h2, h3, ul, .archive__item, .skill-cloud, .reveal-target, .hover-card');
        targets.forEach(function(el) {
          el.setAttribute('data-aos', 'fade-up');
        });
        AOS.init({ duration: 800, easing: 'ease-out', once: false, offset: 40 });
      });
    </script>

    <script>
      const dot = document.getElementById("cursor-dot");
      const outline = document.getElementById("cursor-outline");
      let isCursorActive = false;
      let mouseX = 0, mouseY = 0;
      let outlineX = 0, outlineY = 0;

      window.addEventListener("mousemove", function (e) {
        if (!isCursorActive) {
          document.body.classList.add("custom-cursor-active");
          dot.style.opacity = "1";
          outline.style.opacity = "1";
          isCursorActive = true;
        }
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = `${mouseX}px`;
        dot.style.top = `${mouseY}px`;
      });

      function animateOutline() {
        outlineX += (mouseX - outlineX) * 0.2;
        outlineY += (mouseY - outlineY) * 0.2; 
        outline.style.left = `${outlineX}px`;
        outline.style.top = `${outlineY}px`;
        requestAnimationFrame(animateOutline);
      }
      animateOutline();

      const interactables = document.querySelectorAll("a, button, .hover-card, .skill-badge, input, textarea");
      interactables.forEach(el => {
        el.addEventListener("mouseenter", () => {
          outline.style.width = "50px";
          outline.style.height = "50px";
          outline.style.backgroundColor = "rgba(128, 0, 0, 0.1)";
          outline.style.border = "2px solid #ff4d4d";
        });
        el.addEventListener("mouseleave", () => {
          outline.style.width = "32px";
          outline.style.height = "32px";
          outline.style.backgroundColor = "transparent";
          outline.style.border = "2px solid rgba(128, 0, 0, 0.6)";
        });
      });
    </script>

    <script>
      const bootLoader = document.getElementById('boot-loader');
      const terminalText = document.getElementById('terminal-text');

      if (!sessionStorage.getItem('systemBooted')) {
        const bootSequence = [
          "OM_OS v2.0.26 (x86_64) booting...",
          "[ OK ] CPU Core 0: Initialized",
          "[ OK ] Memory Test: 64000K Passed",
          "[ OK ] Mounting Root File System...",
          "Starting ROS 2 Daemon...",
          "[ OK ] Initializing /teleop_twist_keyboard node",
          "[ OK ] Starting /sentry_robot_controller",
          "[ OK ] Establishing DRON Uplink...",
          "Loading Mechatronics Subsystems...",
          "Establishing Secure Connection...",
          "ACCESS GRANTED.",
          "Welcome to Om Bhatt's Academic Portfolio."
        ];

        let delay = 0;
        bootSequence.forEach((line, index) => {
          delay += Math.random() * 150 + 80; 
          setTimeout(() => {
            const p = document.createElement('div');
            p.className = 'log-line';
            p.textContent = line;
            terminalText.appendChild(p);
            
            if (index === bootSequence.length - 1) {
              const cursor = document.createElement('span');
              cursor.className = 'cursor-blink';
              p.appendChild(cursor);
              
              setTimeout(() => {
                bootLoader.classList.add('hidden'); 
                setTimeout(() => bootLoader.style.display = 'none', 600); 
                sessionStorage.setItem('systemBooted', 'true'); 
              }, 1400); 
            }
          }, delay);
        });
      } else {
        bootLoader.style.display = 'none';
      }
    </script>
    
  </body>
</html>
